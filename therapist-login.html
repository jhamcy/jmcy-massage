<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapist Portal Login | JMCY Massage</title>
    <!-- Import Supabase Javascript Client SDK Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary-gold: #d4af37;
            --dark-bg: #11141a;
            --card-bg: #1b1f27;
            --text-light: #ffffff;
            --text-muted: #9ca3af;
            --success-green: #10b981;
            --danger-red: #ef4444;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 120px 20px 40px 20px; /* Space for fixed top header */
        }

        /* Top Header Navigation (Matched to site architecture) */
        header {
            background-color: rgba(17, 20, 26, 0.95);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            border-bottom: 1px solid #232936;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary-gold);
        }

        /* Nav Layout and Links matched to previous structures */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-link:hover {
            color: var(--primary-gold);
        }

        /* Hamburger Button Vector */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-light);
            transition: transform 0.3s, opacity 0.3s;
        }

        /* Centered Form Card Wrapper */
        .login-container {
            background-color: var(--card-bg);
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #232936;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
        }

        h2 {
            color: var(--text-light);
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h2 span {
            color: var(--primary-gold);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            background-color: var(--dark-bg);
            border: 1px solid #232936;
            border-radius: 6px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary-gold);
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-gold);
            color: #11141a;
            border: none;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid #232936;
            padding-top: 20px;
        }

        .footer-links a {
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Error and Status Popups styling */
        .alert {
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }

        .alert-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Responsive Breakpoints & Mobile Navigation Drawer overrides */
        @media (max-width: 767px) {
            .menu-toggle {
                display: flex;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #11141a;
                border-bottom: 1px solid #232936;
                padding: 25px 5%;
                gap: 20px;
                text-align: left;
                align-items: flex-start;
                box-shadow: 0 10px 15px rgba(0,0,0,0.4);
            }

            .nav-menu.active {
                display: flex;
            }

            .nav-link {
                width: 100%;
                padding: 10px 0;
                font-size: 16px;
            }

            .menu-toggle.active span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.active span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }
        }
    </style>
</head>
<body>

    <!-- Upper Navigation Menu -->
    <header>
        <div class="logo">JMCY<span>Massage</span></div>
        
        <button class="menu-toggle" id="mobileMenuBtn" aria-label="Toggle navigation structural links">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="nav-menu" id="navMenu">
            <a href="index.html" class="nav-link">← Back to Main Website</a>
            <a href="therapist-register.html" class="nav-link">Register as a Therapist</a>
        </nav>
    </header>

    <!-- Secure Portal Access Interface Block -->
    <div class="login-container">
        <h2>Therapist <span>Portal</span></h2>
        <p class="subtitle">Enter your details below to access your prepaid wallet ledger and dispatch parameters.</p>

        <!-- Dynamic feedback alert notification box container -->
        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="phone">Registered Phone Number</label>
                <input type="tel" id="phone" required placeholder="e.g. 0917XXXXXXX" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Account Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn" class="btn-login">Secure Login</button>
        </form>

        <div class="footer-links">
            Don't have an account yet? <br>
            <a href="therapist-register.html">Apply as an Affiliate Partner →</a>
        </div>
    </div>

    <script>
        // Initialize the connection using your credentials
        const SUPABASE_URL = "https://lkyjuwwvciyyozduzxso.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxreWp1d3d2Y2l5eW96ZHV6eHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY1MTIsImV4cCI6MjA5NDY2MjUxMn0.IY3WU42SdnLnE94XcKZDZXCYXlLxZyWwpFy7YwzdWM8";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Hamburger Menu Toggle Logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navMenu = document.getElementById('navMenu');

        mobileMenuBtn.addEventListener('click', () => {
            mobileMenuBtn.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        const loginForm = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        // Notification routing logic function
        function displayAlert(message, type) {
            alertBox.textContent = message;
            alertBox.style.display = "block";
            if (type === 'error') {
                alertBox.className = "alert alert-error";
            } else {
                alertBox.className = "alert alert-success";
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI component state lock management
            submitBtn.disabled = true;
            submitBtn.textContent = "Verifying Security Credentials...";
            alertBox.style.display = "none";

            let phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            if (phone === "" || password === "") {
                displayAlert("Please complete all security fields correctly.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Secure Login";
                return;
            }

            // Automatically format local numbers to international E.164 (+63) format to align with register.html logic
            if (phone.startsWith('0')) {
                phone = '+63' + phone.substring(1);
            } else if (!phone.startsWith('+')) {
                phone = '+' + phone;
            }

            try {
                // Sign in with phone and password via Supabase Auth engine
                const { data, error } = await _supabase.auth.signInWithPassword({
                    phone: phone,
                    password: password,
                });

                if (error) throw error;

                if (data.user) {
                    displayAlert("🎉 Verification cleared! Opening dashboard...", "success");
                    
                    // Route directly into the secure prepaid dashboard interface
                    setTimeout(() => {
                        window.location.href = "therapist-dashboard.html";
                    }, 1500);
                }

            } catch (error) {
                displayAlert(error.message || "Invalid phone number or password combination.", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Secure Login";
            }
        });
    </script>
</body>
</html>
